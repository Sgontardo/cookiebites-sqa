name: CI/CD Pipeline para CookieBites SQA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read

env:
  JAVA_VERSION: '17'
  CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
  CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

defaults:
  run:
    shell: bash

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # ──────────────────────────────────────────────
      # 1. JUnit (Pruebas Unitarias + Integración)
      # ──────────────────────────────────────────────

      - name: JUnit - Build, test and generate coverage
        id: junit-tests
        continue-on-error: true
        run: ./mvnw -B clean verify

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn

      - name: Report JUnit to ClickUp
        if: ${{ always() && env.CLICKUP_API_TOKEN != '' && env.CLICKUP_LIST_ID != '' }}
        env:
          TEST_STATUS: ${{ steps.junit-tests.outcome }}
        run: |
          set -euo pipefail
          if [ "$TEST_STATUS" = "success" ]; then
            status_icon="✅"
            status_text="PASSED"
          else
            status_icon="❌"
            status_text="FAILED"
          fi
          task_name="[JUNIT] Pruebas Unitarias e Integracion - $status_text - ${GITHUB_SHA:0:7}"
          description="**Tipo:** Pruebas Unitarias e Integracion (JUnit)\n**Resultado:** $status_icon $status_text\n**Commit:** ${GITHUB_SHA:0:7}\n**Branch:** $GITHUB_REF_NAME\n**Run:** $RUN_URL\n\n**Artefactos:**\n- Reporte JUnit: $RUN_URL (artifact: surefire-reports)"
          description=$(echo "$description" | sed 's/\\n/\n/g')
          payload=$(jq -n \
            --arg name "$task_name" \
            --arg description "$description" \
            --arg status "$status_text" \
            '{name: $name, description: $description, status: $status, tags: ["junit", "prueba-unitaria", "reporte-automatico"]}')
          curl -fsSL -X POST "https://api.clickup.com/api/v2/list/$CLICKUP_LIST_ID/task" \
            -H "Authorization: $CLICKUP_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"
