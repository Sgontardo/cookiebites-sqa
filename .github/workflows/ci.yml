name: CI/CD Pipeline para CookieBites SQA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read

env:
  IMAGE_NAME: cookiebites-sqa
  JAVA_VERSION: '17'
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
  CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

defaults:
  run:
    shell: bash

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # ──────────────────────────────────────────────
      # 1. JUnit (Pruebas Unitarias + Integración)
      # ──────────────────────────────────────────────

      - name: JUnit - Build, test and generate coverage
        id: junit-tests
        continue-on-error: true
        run: ./mvnw -B clean verify

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Report JUnit to ClickUp
        if: ${{ always() && env.CLICKUP_API_TOKEN != '' && env.CLICKUP_LIST_ID != '' }}
        env:
          TEST_STATUS: ${{ steps.junit-tests.outcome }}
        run: |
          set -euo pipefail
          if [ "$TEST_STATUS" = "success" ]; then
            status_icon="✅"
            status_text="Pasó"
          else
            status_icon="❌"
            status_text="Falló"
          fi
          task_name="[JUNIT] Pruebas Unitarias e Integracion - $status_text - ${GITHUB_SHA:0:7}"
          description="**Tipo:** Pruebas Unitarias e Integracion (JUnit + JaCoCo)\n**Resultado:** $status_icon $status_text\n**Commit:** ${GITHUB_SHA:0:7}\n**Branch:** $GITHUB_REF_NAME\n**Run:** $RUN_URL\n\n**Artefactos:**\n- Reporte JUnit: $RUN_URL (artifact: surefire-reports)\n- Cobertura JaCoCo: $RUN_URL (artifact: jacoco-report)"
          payload=$(jq -n \
            --arg name "$task_name" \
            --arg description "$description" \
            '{name: $name, description: $description, tags: ["junit", "prueba-unitaria", "cobertura", "reporte-automatico"]}')
          curl -fsSL -X POST "https://api.clickup.com/api/v2/list/$CLICKUP_LIST_ID/task" \
            -H "Authorization: $CLICKUP_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"

      # ──────────────────────────────────────────────
      # 2. Docker + Selenium Grid
      # ──────────────────────────────────────────────

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:ci .

      - name: Start application container
        run: |
          docker run -d --rm --name $IMAGE_NAME-smoke -p 8080:8080 $IMAGE_NAME:ci
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8080/productos >/dev/null; then
              echo 'Aplicacion lista.'
              exit 0
            fi
            sleep 2
          done
          docker logs $IMAGE_NAME-smoke || true
          docker stop $IMAGE_NAME-smoke >/dev/null 2>&1 || true
          echo 'La aplicacion no estuvo lista a tiempo.'
          exit 1

      - name: Start Selenium Grid
        run: |
          docker run -d --name selenium-chrome --network host --shm-size=2gb selenium/standalone-chrome:latest
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:4444/wd/hub/status >/dev/null 2>&1; then
              echo 'Selenium Grid listo.'
              exit 0
            fi
            sleep 2
          done
          docker logs selenium-chrome || true
          echo 'Selenium Grid no estuvo listo a tiempo.'
          exit 1

      # ──────────────────────────────────────────────
      # 3. Selenium (Pruebas de Sistema)
      # ──────────────────────────────────────────────

      - name: Selenium - Run tests
        id: selenium-tests
        continue-on-error: true
        run: ./mvnw -B test -P selenium-tests
        env:
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
          TARGET_URL: http://localhost:8080/LogIn.html

      - name: Report Selenium to ClickUp
        if: ${{ always() && env.CLICKUP_API_TOKEN != '' && env.CLICKUP_LIST_ID != '' }}
        env:
          TEST_STATUS: ${{ steps.selenium-tests.outcome }}
        run: |
          set -euo pipefail
          if [ "$TEST_STATUS" = "success" ]; then
            status_icon="✅"
            status_text="Pasó"
          else
            status_icon="❌"
            status_text="Falló"
          fi
          task_name="[SELENIUM] Pruebas de Sistema - $status_text - ${GITHUB_SHA:0:7}"
          description="**Tipo:** Pruebas de Sistema (Selenium)\n**Resultado:** $status_icon $status_text\n**Commit:** ${GITHUB_SHA:0:7}\n**Branch:** $GITHUB_REF_NAME\n**Run:** $RUN_URL\n\n**Artefactos:**\n- Reporte Selenium: $RUN_URL (artifact: selenium-reports)"
          payload=$(jq -n \
            --arg name "$task_name" \
            --arg description "$description" \
            '{name: $name, description: $description, tags: ["selenium", "prueba-sistema", "reporte-automatico"]}')
          curl -fsSL -X POST "https://api.clickup.com/api/v2/list/$CLICKUP_LIST_ID/task" \
            -H "Authorization: $CLICKUP_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"

      # ──────────────────────────────────────────────
      # 4. JMeter (Pruebas de Rendimiento)
      # ──────────────────────────────────────────────

      - name: JMeter - Run tests
        id: jmeter-tests
        continue-on-error: true
        run: ./mvnw -B verify -P jmeter-tests -DskipTests -D"jmeter.host=localhost" -D"jmeter.port=8080" -D"jmeter.protocol=http"

      - name: Report JMeter to ClickUp
        if: ${{ always() && env.CLICKUP_API_TOKEN != '' && env.CLICKUP_LIST_ID != '' }}
        env:
          TEST_STATUS: ${{ steps.jmeter-tests.outcome }}
        run: |
          set -euo pipefail
          if [ "$TEST_STATUS" = "success" ]; then
            status_icon="✅"
            status_text="Pasó"
          else
            status_icon="❌"
            status_text="Falló"
          fi
          task_name="[JMETER] Pruebas de Rendimiento - $status_text - ${GITHUB_SHA:0:7}"
          description="**Tipo:** Pruebas de Rendimiento (JMeter)\n**Resultado:** $status_icon $status_text\n**Commit:** ${GITHUB_SHA:0:7}\n**Branch:** $GITHUB_REF_NAME\n**Run:** $RUN_URL\n\n**Artefactos:**\n- Reporte JMeter: $RUN_URL (artifact: jmeter-reports)"
          payload=$(jq -n \
            --arg name "$task_name" \
            --arg description "$description" \
            '{name: $name, description: $description, tags: ["jmeter", "prueba-rendimiento", "reporte-automatico"]}')
          curl -fsSL -X POST "https://api.clickup.com/api/v2/list/$CLICKUP_LIST_ID/task" \
            -H "Authorization: $CLICKUP_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"

      # ──────────────────────────────────────────────
      # Upload de artefactos + Limpieza
      # ──────────────────────────────────────────────

      - name: Upload Selenium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-reports
          path: target/surefire-reports/
          if-no-files-found: warn

      - name: Upload JMeter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-reports
          path: target/jmeter/reports/
          if-no-files-found: warn

      - name: Stop test containers
        if: always()
        run: |
          docker stop $IMAGE_NAME-smoke >/dev/null 2>&1 || true
          docker stop selenium-chrome >/dev/null 2>&1 || true

      # ──────────────────────────────────────────────
      # 5. SonarQube (Análisis Estático)
      # ──────────────────────────────────────────────

      - name: SonarQube Scan
        id: sonarqube-scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Report SonarQube to ClickUp
        if: ${{ always() && env.CLICKUP_API_TOKEN != '' && env.CLICKUP_LIST_ID != '' && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        env:
          TEST_STATUS: ${{ steps.sonarqube-scan.outcome }}
        run: |
          set -euo pipefail
          if [ "$TEST_STATUS" = "success" ]; then
            status_icon="✅"
            status_text="Pasó"
          else
            status_icon="❌"
            status_text="Falló"
          fi
          task_name="[SONARQUBE] Analisis Estatico - $status_text - ${GITHUB_SHA:0:7}"
          description="**Tipo:** Analisis Estatico (SonarQube)\n**Resultado:** $status_icon $status_text\n**Commit:** ${GITHUB_SHA:0:7}\n**Branch:** $GITHUB_REF_NAME\n**Run:** $RUN_URL\n\n**Reporte:** $SONAR_HOST_URL/dashboard?id=cookiebites-sqa"
          payload=$(jq -n \
            --arg name "$task_name" \
            --arg description "$description" \
            '{name: $name, description: $description, tags: ["sonarqube", "analisis-estatico", "reporte-automatico"]}')
          curl -fsSL -X POST "https://api.clickup.com/api/v2/list/$CLICKUP_LIST_ID/task" \
            -H "Authorization: $CLICKUP_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"
